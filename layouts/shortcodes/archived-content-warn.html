{{ $rawDate := .Get 0 }}

{{ if $rawDate }}
    {{ $parsedDate := time.AsTime $rawDate }}
    <div class="first-wrote-note" style="
        font-size: 0.9rem;
        color: #666;
        background-color: rgba(128, 128, 128, 0.05);
        border-left: 4px solid #888;
        padding: 0.8rem 1rem;
        margin: 2rem 0;
        border-radius: 4px;
        display: flex;
        align-items: center;
        gap: 8px;
    ">
        <svg xmlns="http://www.w3.org/2006/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span>
            <strong>归档提示：</strong>本文最初写作于 
            <time>{{ $parsedDate.Format "2006年01月02日" }}</time>，部分内容可能已随时间发生改变。
        </span>
    </div>
{{ else }}
    <p style="color: red;">[shortcode err: `archived-content-warn` needs a date, e.g. '2006-01-02']</p>
{{ end }}
